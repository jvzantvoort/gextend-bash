name: Release

on:
  release:
    types: [published]
permissions:
  contents: write
  packages: write

jobs:
  release:
    permissions:
      contents: write  # to upload release asset (actions/upload-release-asset)

    name: Release gextend-bash
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [386, amd64, arm64]
        exclude:
          - goos: darwin
            goarch: 386

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Prepare build directory
        run: |
          mkdir -p build/${{ matrix.goos }}.${{ matrix.goarch }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          find cmd -maxdepth 1 -mindepth 1 -type d -printf "%f\n" | \
            while read -r target; do \
             CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch  }} go build -trimpath -o $GITHUB_WORKSPACE/build/${{ matrix.goos }}.${{ matrix.goarch }} ./cmd/${target}; \
            done
          cp gextend-bash-update $GITHUB_WORKSPACE/build/${{ matrix.goos }}.${{ matrix.goarch }}/gextend-bash-update

      - name: Create package
        id: package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PACKAGE_NAME=gextend-bash.${VERSION}.${{ matrix.goos }}.${{ matrix.goarch }}.tar.gz
          tar -czvf $PACKAGE_NAME -C build/${{ matrix.goos }}.${{ matrix.goarch }} .
          echo "name=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate checksum
        run: |
          sha256sum ${{ steps.package.outputs.name }} > ${{ steps.package.outputs.name }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.package.outputs.name }}
            ${{ steps.package.outputs.name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
